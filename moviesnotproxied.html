        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Nunito', sans-serif;
            background-color: var(--body-bg);
            background-image: var(--bg-image);
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            background-size: cover;
            min-height: 100vh;
            color: var(--accent);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background 0.4s ease, color 0.4s ease;
        }
        
        .mode-label {
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
        }

        .container {
            width: 100%;
            max-width: 1400px;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h1 {
            font-size: 3.5rem;
            letter-spacing: 12px;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 30px;
            color: var(--accent);
        }

        .search-container {
            max-width: 600px;
            margin: 0 auto 30px;
        }

        .search-input {
            width: 100%;
            height: 54px;
            border-radius: 50px;
            border: 2px solid var(--accent);
            padding: 0 25px;
            background: var(--glass);
            color: var(--accent);
            font-size: 1rem;
            font-weight: 700;
            outline: none;
            transition: 0.3s;
        }

        .filter-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .filter-btn {
            padding: 12px 25px;
            border-radius: 50px;
            border: 2px solid var(--accent);
            background: var(--glass);
            color: var(--accent);
            font-weight: 800;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .filter-btn.active,
        .filter-btn:hover {
            background: var(--accent);
            color: var(--body-bg);
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 30px;
        }

        .movie-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid var(--accent);
            border-radius: 25px;
            overflow: hidden;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .movie-card:hover {
            transform: translateY(-10px);
        }

        .movie-poster {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            border-bottom: 2px solid var(--accent);
        }

        .movie-info {
            padding: 20px;
            text-align: center;
        }

        .movie-title {
            font-size: 1.1rem;
            font-weight: 900;
            margin-bottom: 5px;
            color: var(--accent);
        }

        .movie-date {
            font-size: 0.85rem;
            font-weight: 700;
            opacity: 0.6;
            color: var(--accent);
        }

        .movie-rating {
            color: var(--accent);
            font-weight: 900;
            margin-top: 5px;
        }

        .player-container {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.98);
            z-index: 9999;
            display: none;
            flex-direction: column;
        }

        .player-container.show {
            display: flex;
        }

        .player-header {
            padding: 20px;
            background: #325aa8;
            border-bottom: 2px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            flex-wrap: wrap;
            gap: 15px;
        }

        .player-title {
            color: var(--accent);
            font-weight: 900;
            font-size: 1.5rem;
            max-width: 40%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-controls-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-grow: 1;
            justify-content: center;
        }

        .tv-controls {
            display: none;
            gap: 10px;
            align-items: center;
        }

        .server-controls {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .close-btn {
            background: var(--accent);
            color: var(--body-bg);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .player-wrapper {
            flex: 1;
            padding: 20px;
            background: #000;
            display: flex;
            justify-content: center;
        }

        iframe {
            width: 100%;
            max-width: 1200px;
            height: 100%;
            border: 3px solid #325aa8;
            border-radius: 20px;
        }

        #pagination button {
            padding: 10px 25px;
            border-radius: 50px;
            border: 2px solid var(--accent);
            background: var(--glass);
            color: var(--accent);
            font-weight: 900;
            cursor: pointer;
            margin: 0 10px;
        }

        #pagination button:disabled {
            opacity: 0.3;
        }

        select.filter-btn {
            padding: 5px 15px;
            height: auto;
            font-size: 0.9rem;
            outline: none;
        }

        select.filter-btn option {
            background: var(--body-bg);
            color: var(--accent);
        }
    </style>
</head>

<body>
    <div style="position:fixed;top:15px;left:15px;z-index:9999;font-size:8px;color:var(--accent);max-width:380px;line-height:1.4;opacity:0.5;">
        Disclaimer: This website doesn't host any files.
    </div>

    <div class="container">
        <div class="header">
            <h1>Movies &amp; TV Shows</h1>
            <div class="search-container">
                <input type="text" class="search-input" id="searchInput" placeholder="Search movies and TV shows...">
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="popular">Popular</button>
                <button class="filter-btn" data-filter="trending">Trending</button>
                <button class="filter-btn" data-filter="top_rated">Top Rated</button>
                <button class="filter-btn" data-filter="now_playing">Now Playing</button>
                <button class="filter-btn" data-filter="upcoming">Upcoming</button>
            </div>
        </div>
        <div id="loading" style="text-align: center; padding: 50px; font-size: 20px; display: none;">Loading...</div>
        <div id="moviesGrid" class="movies-grid"></div>
        <div id="pagination"></div>
    </div>

    <div class="player-container" id="playerContainer">
        <div class="player-header">
            <div class="player-title" id="playerTitle">Loading...</div>

            <div class="player-controls-wrapper">
                <div id="tv-controls" class="tv-controls">
                    <select id="seasonSelect" class="filter-btn"></select>
                    <select id="episodeSelect" class="filter-btn"></select>
                </div>

                <div class="server-controls">
                    <select id="serverSelect" class="filter-btn">
                        <option value="vidrock">Server 1 (VidRock)</option>
                        <option value="cinezo">Server 2 (Cinezo)</option>
                        <option value="vidfast">Server 3 (Vidfast)</option>
                        <option value="videasy">Server 4 (Videasy)</option>
                        <option value="111movies">Server 5 (111movies)</option>
                    </select>
                </div>
            </div>

            <button class="close-btn" id="closeBtn">X</button>
        </div>
        <div class="player-wrapper">
            <iframe id="playerIframe" frameborder="0" allow="autoplay; encrypted-media; fullscreen" allowfullscreen=""></iframe>
        </div>
    </div>

    <script>
        // Movie API Logic
        const k = "2713804610e1e236b1cf44bfac3a7776",
            b = "https://api.themoviedb.org/3",
            i = "https://image.tmdb.org/t/p/w500";
        let f = "popular",
            p = 1,
            t = null,
            s = null;
        const l = document.getElementById('loading'),
            g = document.getElementById('moviesGrid'),
            q = document.getElementById('searchInput'),
            fb = document.querySelectorAll('.filter-btn'),
            pc = document.getElementById('playerContainer'),
            ifm = document.getElementById('playerIframe'),
            pt = document.getElementById('playerTitle'),
            cb = document.getElementById('closeBtn'),
            srvSel = document.getElementById('serverSelect');

        let currentType = 'movie';
        let currentId = null;

        load();

        fb.forEach(x => {
            if (x.tagName === 'BUTTON') {
                x.onclick = () => {
                    fb.forEach(y => y.classList.remove('active'));
                    x.classList.add('active');
                    f = x.dataset.filter;
                    p = 1;
                    load()
                }
            }
        });

        q.oninput = e => {
            clearTimeout(s);
            let v = e.target.value.trim();
            if (!v) {
                p = 1;
                load();
                return
            }
            s = setTimeout(() => search(v), 600)
        };
        cb.onclick = () => {
            pc.classList.remove('show');
            ifm.src = '';
            t = null;
        };

        // Server switcher tracking trigger
        srvSel.onchange = () => {
            const sSel = document.getElementById('seasonSelect');
            const eSel = document.getElementById('episodeSelect');
            const season = sSel.value || 1;
            const episode = eSel.value || 1;

            if (currentId) {
                updatePlayer(currentType, currentId, season, episode);
            }
        };

        function load() {
            l.style.display = 'block';
            g.innerHTML = '';
            let u = f === 'popular' ? `${b}/movie/popular?api_key=${k}&page=${p}` :
                f === 'trending' ? `${b}/trending/all/day?api_key=${k}&page=${p}` :
                f === 'top_rated' ? `${b}/movie/top_rated?api_key=${k}&page=${p}` :
                f === 'now_playing' ? `${b}/movie/now_playing?api_key=${k}&page=${p}` :
                `${b}/movie/upcoming?api_key=${k}&page=${p}`;
            fetch(u).then(r => r.json()).then(d => show(d.results, d.total_pages))
        }

        function search(v) {
            l.style.display = 'block';
            g.innerHTML = '';
            fetch(`${b}/search/multi?api_key=${k}&query=${encodeURIComponent(v)}&page=${p}`).then(r => r.json()).then(d => show(d.results, d.total_pages))
        }

        function show(m, tp) {
            l.style.display = 'none';
            g.innerHTML = '';
            if (!m.length) {
                g.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:50px">No results found.</div>';
                return
            }
            m.forEach(mv => {
                if (!mv.poster_path) return;
                let c = document.createElement('div');
                c.className = 'movie-card';
                let im = document.createElement('img');
                im.className = 'movie-poster';
                im.src = i + mv.poster_path;
                im.alt = mv.title || mv.name;
                let inf = document.createElement('div');
                inf.className = 'movie-info';
                let ti = document.createElement('div');
                ti.className = 'movie-title';
                ti.textContent = mv.title || mv.name;
                let dt = document.createElement('div');
                dt.className = 'movie-date';
                dt.textContent = mv.release_date || mv.first_air_date || '—';
                let ra = document.createElement('div');
                ra.className = 'movie-rating';
                ra.textContent = `⭐ ${mv.vote_average?mv.vote_average.toFixed(1):'—'}`;
                inf.append(ti, dt, ra);
                c.append(im, inf);
                c.onclick = () => open(mv);
                g.appendChild(c)
            });
            if (tp > 1) pag(tp)
        }

        function pag(tp) {
            let d = document.createElement('div');
            d.style.cssText = 'display:flex;justify-content:center;gap:15px;margin:30px 0';
            let prev = document.createElement('button');
            prev.textContent = 'Previous';
            prev.disabled = p === 1;
            prev.onclick = () => {
                if (p > 1) {
                    p--;
                    q.value ? search(q.value) : load();
                    scrollTo(0, 0)
                }
            }
            let next = document.createElement('button');
            next.textContent = 'Next';
            next.disabled = p === tp;
            next.onclick = () => {
                if (p < tp) {
                    p++;
                    q.value ? search(q.value) : load();
                    scrollTo(0, 0)
                }
            }
            let info = document.createElement('span');
            info.textContent = `Page ${p} / ${tp}`;
            info.style.cssText = 'padding:10px 20px'
            d.append(prev, info, next);
            document.getElementById('pagination').innerHTML = '';
            document.getElementById('pagination').appendChild(d)
        }

        function open(mv) {
            t = mv;
            pt.textContent = mv.title || mv.name;
            pc.classList.add('show');

            const tvControls = document.getElementById('tv-controls');

            let type = mv.media_type;
            if (!type) {
                type = mv.name ? 'tv' : 'movie';
            }

            currentType = type;
            currentId = mv.id;

            if (type === 'tv') {
                tvControls.style.display = 'flex';
                setupTvSelectors(mv.id);
                updatePlayer('tv', mv.id, 1, 1);
            } else {
                tvControls.style.display = 'none';
                updatePlayer('movie', mv.id);
            }
        }

        // Modified function to update player based on Server Selection
        function updatePlayer(type, id, s = 1, e = 1) {
            const selectedServer = srvSel.value;

            if (selectedServer === 'vidfast') {
                if (type === 'tv') {
                    ifm.src = `https://vidfast.pro/tv/${id}/${s}/${e}`;
                } else {
                    ifm.src = `https://vidfast.pro/movie/${id}`;
                }
            }
            else if (selectedServer === 'cinezo') {
                if (type === 'tv') {
                    ifm.src = `https://api.cinezo.net/tv/${id}/${s}/${e}`;
                } else {
                    ifm.src = `https://api.cinezo.net/movie/${id}`;
                }
            } else if (selectedServer === 'videasy') {
                if (type === 'tv') {
                    ifm.src = `https://player.videasy.net/tv/${id}/${s}/${e}`;
                } else {
                    ifm.src = `https://player.videasy.net/movie/${id}`;
                }
            } else if (selectedServer === '111movies') {
                if (type === 'tv') {
                    ifm.src = `https://111movies.net/tv/${id}&tmdb=1&s=${s}&e=${e}`;
                } else {
                    ifm.src = `https://111movies.net/movie/${id}&tmdb=1`;
                }
            }
            else {
                // Default VidRock Structures
                if (type === 'tv') {
                    ifm.src = `https://vidrock.ru/tv/${id}/${s}/${e}`;
                } else {
                    ifm.src = `https://vidrock.ru/movie/${id}`;
                }
            }
        }

        // Fetch TV details to populate Season/Episode dropdowns
        async function setupTvSelectors(id) {
            const sSel = document.getElementById('seasonSelect');
            const eSel = document.getElementById('episodeSelect');

            const res = await fetch(`${b}/tv/${id}?api_key=${k}`);
            const data = await res.json();

            sSel.innerHTML = '';
            data.seasons.forEach(s => {
                if (s.season_number === 0) return; // Skip specials
                sSel.innerHTML += `<option value="${s.season_number}">Season ${s.season_number}</option>`;
            });

            // When season changes, update episodes
            sSel.onchange = () => updateEpisodes(id, sSel.value);

            // Initial load for Season 1
            updateEpisodes(id, 1);
        }

        async function updateEpisodes(id, sNum) {
            const eSel = document.getElementById('episodeSelect');
            const res = await fetch(`${b}/tv/${id}/season/${sNum}?api_key=${k}`);
            const data = await res.json();

            eSel.innerHTML = '';
            data.episodes.forEach(e => {
                eSel.innerHTML += `<option value="${e.episode_number}">Ep ${e.episode_number}: ${e.name}</option>`;
            });

            eSel.onchange = () => updatePlayer('tv', id, sNum, eSel.value);
        }
    </script>
